<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ÉLITE Apparel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Helvetica Neue", sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h1 {
      letter-spacing: 3px;
      font-weight: 300;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: #aaa;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    .hero {
      height: 90vh;
      background: url("https://images.unsplash.com/photo-1521336575822-6da63fb45455") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 60px;
      font-weight: 200;
      background: rgba(0,0,0,0.4);
      padding: 20px 40px;
      letter-spacing: 4px;
    }

    .section {
      padding: 80px 60px;
      text-align: center;
    }

    .section h3 {
      margin-bottom: 40px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #222;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .card h4 {
      margin-bottom: 10px;
      font-weight: 400;
    }

    .card p {
      color: #aaa;
    }

    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>ÉLITE</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Collections</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>PREMIUM CLOTHING</h2>
  </section>

  <section class="section">
    <h3>NEW ARRIVALS</h3>
    <div class="products">
      
      <div class="card">
        <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
        <h4>Luxury Jacket</h4>
        <p>$120</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1520975922284-7b7c7d3d3d70">
        <h4>Classic Hoodie</h4>
        <p>$80</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
        <h4>Premium T-Shirt</h4>
        <p>$45</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
        <h4>Elegant Coat</h4>
        <p>$150</p>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 ÉLITE Apparel — All Rights Reserved</p>
  </footer>

</body>
</html>
