<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nepali Royal Clothing Collection</title>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HVYSLR546H"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-HVYSLR546H');

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<h1>Nepali Royal Style Clothing (1000 Items)</h1>
<div class="grid" id="collection"></div>

<script>
const clothingTypes = ["Daura Suruwal", "Royal Kurta", "Angrakha", "Sherwani", "Royal Cloak"];
const fabrics = ["Dhaka", "Silk", "Velvet", "Brocade", "Cotton Blend"];
const colors = ["Crimson Red", "Royal Blue", "Ivory White", "Emerald Green", "Gold"];
const patterns = ["Dhaka Pattern", "Floral Embroidery", "Paisley", "Geometric", "Minimalist"];
const embellishments = ["Gold Thread", "Silver Lining", "Hand Embroidery", "Beaded Work", "None"];

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function createItem(i) {
  return {
    name: `${random(colors)} ${random(clothingTypes)}`,
    fabric: random(fabrics),
    pattern: random(patterns),
    embellishment: random(embellishments),
    price: Math.floor(Math.random() * 45000) + 5000
  };
}

const container = document.getElementById("collection");

for (let i = 0; i < 1000; i++) {
  const item = createItem(i);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="title">${item.name}</div>
    <div>Fabric: ${item.fabric}</div>
    <div>Pattern: ${item.pattern}</div>
    <div>Embellishment: ${item.embellishment}</div>
    <div>Price: NPR ${item.price}</div>
  `;

  container.appendChild(card);
}
</script>

</body>
</html>
